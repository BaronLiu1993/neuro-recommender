services:
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - model-cache:/app/cache

  worker:
    build: .
    command: celery -A analysis_queue.analysis_worker worker --pool=solo --loglevel=info
    depends_on:
      - rabbitmq
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - model-cache:/app/cache

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  model-cache:
